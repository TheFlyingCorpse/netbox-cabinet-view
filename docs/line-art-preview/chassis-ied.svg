<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 260" width="360" height="260">
  <!-- Generic IED chassis (Type A) — 2-row backplane, inspired by wide-body protection relays -->
  <!-- Dark enclosure -->
  <rect x="0.5" y="0.5" width="359" height="259" rx="3" fill="#1e1e1e" stroke="#444" stroke-width="1"/>
  <!-- Front panel bezel -->
  <rect x="4" y="4" width="352" height="252" rx="2" fill="#252525" stroke="#555" stroke-width="0.5"/>
  <!-- Top row module slots (12 slots at 30mm each) -->
  <rect x="8" y="8" width="344" height="118" rx="1" fill="#1a1a1a" stroke="#333" stroke-width="0.5"/>
  <!-- Slot dividers row 1 -->
  <line x1="36.7" y1="10" x2="36.7" y2="124" stroke="#333" stroke-width="0.3" stroke-dasharray="2 2"/>
  <line x1="65.3" y1="10" x2="65.3" y2="124" stroke="#333" stroke-width="0.3" stroke-dasharray="2 2"/>
  <line x1="94" y1="10" x2="94" y2="124" stroke="#333" stroke-width="0.3" stroke-dasharray="2 2"/>
  <line x1="122.7" y1="10" x2="122.7" y2="124" stroke="#333" stroke-width="0.3" stroke-dasharray="2 2"/>
  <line x1="151.3" y1="10" x2="151.3" y2="124" stroke="#333" stroke-width="0.3" stroke-dasharray="2 2"/>
  <line x1="180" y1="10" x2="180" y2="124" stroke="#333" stroke-width="0.3" stroke-dasharray="2 2"/>
  <line x1="208.7" y1="10" x2="208.7" y2="124" stroke="#333" stroke-width="0.3" stroke-dasharray="2 2"/>
  <line x1="237.3" y1="10" x2="237.3" y2="124" stroke="#333" stroke-width="0.3" stroke-dasharray="2 2"/>
  <line x1="266" y1="10" x2="266" y2="124" stroke="#333" stroke-width="0.3" stroke-dasharray="2 2"/>
  <line x1="294.7" y1="10" x2="294.7" y2="124" stroke="#333" stroke-width="0.3" stroke-dasharray="2 2"/>
  <line x1="323.3" y1="10" x2="323.3" y2="124" stroke="#333" stroke-width="0.3" stroke-dasharray="2 2"/>
  <!-- Bottom row module slots (12 slots) -->
  <rect x="8" y="134" width="344" height="118" rx="1" fill="#1a1a1a" stroke="#333" stroke-width="0.5"/>
  <!-- Row labels -->
  <text x="6" y="70" text-anchor="middle" font-size="8" fill="#555" font-family="sans-serif" transform="rotate(-90 6 70)">ROW 1</text>
  <text x="6" y="198" text-anchor="middle" font-size="8" fill="#555" font-family="sans-serif" transform="rotate(-90 6 198)">ROW 2</text>
</svg>
