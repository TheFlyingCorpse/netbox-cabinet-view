<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 100">
  <!-- Generic 4-channel analog input module — de-branded -->
  <rect x="0.5" y="0.5" width="19" height="99" rx="1" fill="#d8d4c8" stroke="#888" stroke-width="0.5"/>
  <!-- Green band -->
  <rect x="1" y="1" width="18" height="7" fill="#2a8a2a"/>
  <text x="10" y="6" text-anchor="middle" font-size="4" fill="#fff" font-family="sans-serif" font-weight="bold">AI</text>
  <!-- Bus/power status strip -->
  <rect x="2" y="10" width="3" height="4" rx="0.3" fill="#0a0"/>
  <rect x="2" y="15" width="3" height="4" rx="0.3" fill="#e80"/>
  <!-- 4 bar-graph indicators -->
  <rect x="10" y="11" width="4" height="10" rx="0.3" fill="#1a1a1a" stroke="#555" stroke-width="0.2"/>
  <rect x="10" y="16" width="4" height="5" rx="0" fill="#0c0" opacity="0.7"/>
  <text x="8" y="17" text-anchor="end" font-size="2" fill="#555" font-family="sans-serif">1</text>
  <rect x="10" y="24" width="4" height="10" rx="0.3" fill="#1a1a1a" stroke="#555" stroke-width="0.2"/>
  <rect x="10" y="27" width="4" height="7" rx="0" fill="#0c0" opacity="0.7"/>
  <text x="8" y="30" text-anchor="end" font-size="2" fill="#555" font-family="sans-serif">2</text>
  <rect x="10" y="37" width="4" height="10" rx="0.3" fill="#1a1a1a" stroke="#555" stroke-width="0.2"/>
  <rect x="10" y="42" width="4" height="5" rx="0" fill="#0c0" opacity="0.7"/>
  <text x="8" y="43" text-anchor="end" font-size="2" fill="#555" font-family="sans-serif">3</text>
  <rect x="10" y="50" width="4" height="10" rx="0.3" fill="#1a1a1a" stroke="#555" stroke-width="0.2"/>
  <rect x="10" y="51" width="4" height="9" rx="0" fill="#0c0" opacity="0.7"/>
  <text x="8" y="56" text-anchor="end" font-size="2" fill="#555" font-family="sans-serif">4</text>
  <!-- Label -->
  <text x="10" y="66" text-anchor="middle" font-size="2.3" fill="#444" font-family="sans-serif">4xAI</text>
  <text x="10" y="69.5" text-anchor="middle" font-size="1.8" fill="#444" font-family="sans-serif">4-20mA</text>
  <!-- Terminals -->
  <rect x="2" y="73" width="7" height="3.5" rx="0.3" fill="#e87020" stroke="#a55010" stroke-width="0.2"/>
  <rect x="11" y="73" width="7" height="3.5" rx="0.3" fill="#e87020" stroke="#a55010" stroke-width="0.2"/>
  <rect x="2" y="78" width="7" height="3.5" rx="0.3" fill="#e87020" stroke="#a55010" stroke-width="0.2"/>
  <rect x="11" y="78" width="7" height="3.5" rx="0.3" fill="#e87020" stroke="#a55010" stroke-width="0.2"/>
  <rect x="2" y="83" width="16" height="3.5" rx="0.3" fill="#0a0" stroke="#080" stroke-width="0.2"/>
  <text x="10" y="85.5" text-anchor="middle" font-size="2" fill="#fff" font-family="sans-serif">GND</text>
  <!-- DIN rail clip -->
  <rect x="3" y="92" width="14" height="5" rx="1" fill="#999" stroke="#777" stroke-width="0.3"/>
  <line x1="5" y1="94.5" x2="15" y2="94.5" stroke="#777" stroke-width="0.3"/>
</svg>