<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 100">
  <!-- Generic fieldbus coupler — de-branded -->
  <rect x="0.5" y="0.5" width="39" height="99" rx="1" fill="#d8d4c8" stroke="#888" stroke-width="0.5"/>
  <!-- Orange band -->
  <rect x="1" y="1" width="38" height="8" fill="#e87020"/>
  <text x="20" y="7" text-anchor="middle" font-size="4" fill="#fff" font-family="sans-serif" font-weight="bold">BUS</text>
  <!-- RJ45 port -->
  <rect x="12" y="12" width="16" height="10" rx="1" fill="#222" stroke="#555" stroke-width="0.3"/>
  <rect x="14" y="14" width="12" height="6" rx="0.5" fill="#333"/>
  <!-- Status LEDs -->
  <circle cx="10" cy="28" r="1.2" fill="#0a0"/>
  <text x="14" y="29" font-size="2.5" fill="#444" font-family="sans-serif">RUN</text>
  <circle cx="10" cy="33" r="1.2" fill="#c00"/>
  <text x="14" y="34" font-size="2.5" fill="#444" font-family="sans-serif">ERR</text>
  <circle cx="10" cy="38" r="1.2" fill="#e80"/>
  <text x="14" y="39" font-size="2.5" fill="#444" font-family="sans-serif">BUS</text>
  <circle cx="10" cy="43" r="1.2" fill="#0a0"/>
  <text x="14" y="44" font-size="2.5" fill="#444" font-family="sans-serif">I/O</text>
  <!-- DIP switches -->
  <rect x="8" y="50" width="24" height="8" rx="0.5" fill="#335" stroke="#555" stroke-width="0.3"/>
  <rect x="10" y="51.5" width="3" height="5" rx="0.3" fill="#557"/>
  <rect x="14" y="51.5" width="3" height="5" rx="0.3" fill="#557"/>
  <rect x="18" y="51.5" width="3" height="5" rx="0.3" fill="#557"/>
  <rect x="22" y="51.5" width="3" height="5" rx="0.3" fill="#557"/>
  <rect x="26" y="51.5" width="3" height="5" rx="0.3" fill="#557"/>
  <!-- Label -->
  <text x="20" y="65" text-anchor="middle" font-size="2.8" fill="#444" font-family="sans-serif">Fieldbus</text>
  <text x="20" y="68.5" text-anchor="middle" font-size="2.8" fill="#444" font-family="sans-serif">Coupler</text>
  <!-- Spring-cage terminals (bus power) -->
  <rect x="5" y="74" width="6" height="4" rx="0.3" fill="#e87020" stroke="#a55010" stroke-width="0.3"/>
  <rect x="13" y="74" width="6" height="4" rx="0.3" fill="#e87020" stroke="#a55010" stroke-width="0.3"/>
  <rect x="21" y="74" width="6" height="4" rx="0.3" fill="#e87020" stroke="#a55010" stroke-width="0.3"/>
  <rect x="29" y="74" width="6" height="4" rx="0.3" fill="#e87020" stroke="#a55010" stroke-width="0.3"/>
  <text x="8" y="82" font-size="2" fill="#666" font-family="sans-serif">24V</text>
  <text x="16" y="82" font-size="2" fill="#666" font-family="sans-serif">0V</text>
  <text x="23" y="82" font-size="2" fill="#666" font-family="sans-serif">PE</text>
  <!-- DIN rail clip -->
  <rect x="8" y="90" width="24" height="6" rx="1" fill="#999" stroke="#777" stroke-width="0.3"/>
  <line x1="10" y1="93" x2="30" y2="93" stroke="#777" stroke-width="0.3"/>
</svg>