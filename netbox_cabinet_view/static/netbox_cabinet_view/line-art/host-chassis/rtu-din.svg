<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 80">
  <!-- Generic DIN-rail shelf enclosure — de-branded -->
  <!-- Light grey bezel -->
  <rect x="0.5" y="0.5" width="439" height="79" rx="2" fill="#d0d0d0" stroke="#888" stroke-width="1"/>
  <rect x="4" y="4" width="432" height="72" rx="1" fill="#e8e8e8" stroke="#aaa" stroke-width="0.5"/>
  <!-- Interior shadow for depth hint -->
  <rect x="8" y="8" width="424" height="64" rx="1" fill="#ddd" stroke="#bbb" stroke-width="0.3"/>
  <line x1="8" y1="10" x2="432" y2="10" stroke="#ccc" stroke-width="0.5"/>
  <!-- DIN rail (horizontal groove with angled edges) -->
  <rect x="20" y="32" width="400" height="16" rx="0.5" fill="#999" stroke="#777" stroke-width="0.5"/>
  <line x1="20" y1="35" x2="420" y2="35" stroke="#aaa" stroke-width="0.3"/>
  <line x1="20" y1="45" x2="420" y2="45" stroke="#888" stroke-width="0.3"/>
  <!-- Angled edges on DIN rail -->
  <path d="M20 32 L24 28 L416 28 L420 32" fill="none" stroke="#888" stroke-width="0.4"/>
  <path d="M20 48 L24 52 L416 52 L420 48" fill="none" stroke="#888" stroke-width="0.4"/>
  <!-- Label -->
  <text x="30" y="24" font-size="7" fill="#666" font-family="sans-serif" font-weight="bold">DIN RAIL SHELF</text>
</svg>