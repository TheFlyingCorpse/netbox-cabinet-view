<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 2160">
  <!-- Generic MCC cabinet front panel — de-branded -->
  <!-- Dark frame -->
  <rect x="0" y="0" width="760" height="2160" rx="4" fill="#2a2a2a" stroke="#444" stroke-width="2"/>
  <rect x="8" y="8" width="744" height="2144" rx="2" fill="#333" stroke="#555" stroke-width="1"/>
  <!-- Door hinge marks (left side) -->
  <rect x="2" y="200" width="6" height="40" rx="1" fill="#555" stroke="#666" stroke-width="0.5"/>
  <rect x="2" y="1000" width="6" height="40" rx="1" fill="#555" stroke="#666" stroke-width="0.5"/>
  <rect x="2" y="1800" width="6" height="40" rx="1" fill="#555" stroke="#666" stroke-width="0.5"/>
  <!-- Vertical busbar (right side, copper-colored) -->
  <rect x="700" y="40" width="30" height="2080" rx="1" fill="#b87333" stroke="#8a5520" stroke-width="1"/>
  <line x1="715" y1="40" x2="715" y2="2120" stroke="#cc8844" stroke-width="0.5" opacity="0.4"/>
  <!-- Busbar connection points -->
  <circle cx="715" cy="400" r="6" fill="#a06020" stroke="#804010" stroke-width="0.5"/>
  <circle cx="715" cy="1000" r="6" fill="#a06020" stroke="#804010" stroke-width="0.5"/>
  <circle cx="715" cy="1600" r="6" fill="#a06020" stroke="#804010" stroke-width="0.5"/>
  <!-- Bucket 1 (top) -->
  <rect x="40" y="80" width="620" height="560" rx="3" fill="#2a2a2a" stroke="#666" stroke-width="1.5"/>
  <text x="350" y="120" text-anchor="middle" font-size="24" fill="#777" font-family="sans-serif">BUCKET 1</text>
  <!-- Handle -->
  <rect x="310" y="330" width="80" height="20" rx="4" fill="#555" stroke="#777" stroke-width="0.8"/>
  <line x1="330" y1="340" x2="370" y2="340" stroke="#888" stroke-width="1"/>
  <!-- Indicator -->
  <circle cx="60" cy="110" r="8" fill="#0a0" stroke="#080" stroke-width="0.5"/>
  <!-- Bucket 2 (middle) -->
  <rect x="40" y="700" width="620" height="560" rx="3" fill="#2a2a2a" stroke="#666" stroke-width="1.5"/>
  <text x="350" y="740" text-anchor="middle" font-size="24" fill="#777" font-family="sans-serif">BUCKET 2</text>
  <rect x="310" y="950" width="80" height="20" rx="4" fill="#555" stroke="#777" stroke-width="0.8"/>
  <line x1="330" y1="960" x2="370" y2="960" stroke="#888" stroke-width="1"/>
  <circle cx="60" cy="730" r="8" fill="#0a0" stroke="#080" stroke-width="0.5"/>
  <!-- Bucket 3 (bottom) -->
  <rect x="40" y="1320" width="620" height="560" rx="3" fill="#2a2a2a" stroke="#666" stroke-width="1.5"/>
  <text x="350" y="1360" text-anchor="middle" font-size="24" fill="#777" font-family="sans-serif">BUCKET 3</text>
  <rect x="310" y="1570" width="80" height="20" rx="4" fill="#555" stroke="#777" stroke-width="0.8"/>
  <line x1="330" y1="1580" x2="370" y2="1580" stroke="#888" stroke-width="1"/>
  <circle cx="60" cy="1350" r="8" fill="#0a0" stroke="#080" stroke-width="0.5"/>
  <!-- Bottom plate -->
  <rect x="20" y="1960" width="700" height="160" rx="2" fill="#2e2e2e" stroke="#555" stroke-width="0.5"/>
  <text x="370" y="2050" text-anchor="middle" font-size="18" fill="#555" font-family="sans-serif">CABLE ENTRY</text>
</svg>