<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 44">
  <!-- Generic 1U WDM shelf — de-branded -->
  <!-- Dark front panel -->
  <rect x="0.5" y="0.5" width="439" height="43" rx="2" fill="#2a2a2a" stroke="#555" stroke-width="1"/>
  <!-- Left handle -->
  <rect x="4" y="8" width="8" height="28" rx="1" fill="#444" stroke="#666" stroke-width="0.3"/>
  <line x1="8" y1="12" x2="8" y2="32" stroke="#555" stroke-width="0.5"/>
  <!-- Right handle -->
  <rect x="428" y="8" width="8" height="28" rx="1" fill="#444" stroke="#666" stroke-width="0.3"/>
  <line x1="432" y1="12" x2="432" y2="32" stroke="#555" stroke-width="0.5"/>
  <!-- 8 slot positions -->
  <rect x="30" y="8" width="45" height="28" rx="1" fill="none" stroke="#555" stroke-width="0.5" stroke-dasharray="3 2"/>
  <rect x="80" y="8" width="45" height="28" rx="1" fill="none" stroke="#555" stroke-width="0.5" stroke-dasharray="3 2"/>
  <rect x="130" y="8" width="45" height="28" rx="1" fill="none" stroke="#555" stroke-width="0.5" stroke-dasharray="3 2"/>
  <rect x="180" y="8" width="45" height="28" rx="1" fill="none" stroke="#555" stroke-width="0.5" stroke-dasharray="3 2"/>
  <rect x="230" y="8" width="45" height="28" rx="1" fill="none" stroke="#555" stroke-width="0.5" stroke-dasharray="3 2"/>
  <rect x="280" y="8" width="45" height="28" rx="1" fill="none" stroke="#555" stroke-width="0.5" stroke-dasharray="3 2"/>
  <rect x="330" y="8" width="45" height="28" rx="1" fill="none" stroke="#555" stroke-width="0.5" stroke-dasharray="3 2"/>
  <rect x="380" y="8" width="45" height="28" rx="1" fill="none" stroke="#555" stroke-width="0.5" stroke-dasharray="3 2"/>
  <!-- Label -->
  <text x="18" y="26" font-size="6" fill="#777" font-family="sans-serif" font-weight="bold" transform="rotate(-90 18 26)">WDM</text>
</svg>