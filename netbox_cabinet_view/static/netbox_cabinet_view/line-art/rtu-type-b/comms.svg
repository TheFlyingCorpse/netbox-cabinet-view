<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 100" width="30" height="100">
  <!-- RTU Type B Comms — dual RJ45, SFP, DB9, industrial grey -->
  <rect x="0.5" y="0.5" width="29" height="99" rx="1" fill="#3a3a3a" stroke="#666" stroke-width="0.5"/>
  <!-- Label strip -->
  <rect x="2" y="2" width="26" height="8" rx="0.5" fill="#444" stroke="#666" stroke-width="0.3"/>
  <text x="15" y="8" text-anchor="middle" font-size="3" fill="#bbb" font-family="sans-serif">COM</text>
  <!-- RJ45 port 1 -->
  <text x="15" y="16" text-anchor="middle" font-size="1.8" fill="#888" font-family="sans-serif">ETH1</text>
  <rect x="7" y="18" width="16" height="8" rx="1" fill="#111" stroke="#4a6a4a" stroke-width="0.4"/>
  <circle cx="7" cy="29" r="0.8" fill="#1e3a1e" stroke="#444" stroke-width="0.2"/>
  <circle cx="23" cy="29" r="0.8" fill="#1e3a3a" stroke="#444" stroke-width="0.2"/>
  <!-- RJ45 port 2 -->
  <text x="15" y="34" text-anchor="middle" font-size="1.8" fill="#888" font-family="sans-serif">ETH2</text>
  <rect x="7" y="36" width="16" height="8" rx="1" fill="#111" stroke="#4a6a4a" stroke-width="0.4"/>
  <circle cx="7" cy="47" r="0.8" fill="#1e3a1e" stroke="#444" stroke-width="0.2"/>
  <circle cx="23" cy="47" r="0.8" fill="#1e3a3a" stroke="#444" stroke-width="0.2"/>
  <!-- SFP cage -->
  <text x="15" y="53" text-anchor="middle" font-size="1.8" fill="#888" font-family="sans-serif">SFP</text>
  <rect x="6" y="55" width="18" height="10" rx="0.5" fill="#111" stroke="#555" stroke-width="0.4"/>
  <rect x="8" y="57" width="14" height="6" rx="0.5" fill="#1a1a1a" stroke="#444" stroke-width="0.2"/>
  <!-- DB9 serial -->
  <text x="15" y="71" text-anchor="middle" font-size="1.8" fill="#888" font-family="sans-serif">SER</text>
  <rect x="6" y="73" width="18" height="6" rx="1" fill="#111" stroke="#555" stroke-width="0.3"/>
  <rect x="8" y="75" width="14" height="2" rx="1" fill="#1a1a1a" stroke="#444" stroke-width="0.2"/>
  <!-- Backplane -->
  <rect x="3" y="84" width="24" height="13" rx="1" fill="#1a1a1a" stroke="#555" stroke-width="0.4"/>
  <rect x="5" y="86" width="20" height="9" rx="0.5" fill="#0a0a0a" stroke="#333" stroke-width="0.3"/>
</svg>