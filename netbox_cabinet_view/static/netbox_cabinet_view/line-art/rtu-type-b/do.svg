<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 100" width="30" height="100">
  <!-- RTU Type B DO 8 — column of 8 red LEDs, relay terminals -->
  <rect x="0.5" y="0.5" width="29" height="99" rx="1" fill="#3a3a3a" stroke="#666" stroke-width="0.5"/>
  <!-- Label strip -->
  <rect x="2" y="2" width="26" height="8" rx="0.5" fill="#444" stroke="#666" stroke-width="0.3"/>
  <text x="15" y="8" text-anchor="middle" font-size="3" fill="#bbb" font-family="sans-serif">DO 8</text>
  <!-- Status bar -->
  <rect x="3" y="12" width="24" height="5" rx="0.5" fill="#333" stroke="#555" stroke-width="0.3"/>
  <circle cx="8" cy="14.5" r="0.8" fill="#1e4a1e" stroke="#444" stroke-width="0.2"/>
  <text x="12" y="15.5" font-size="1.5" fill="#777" font-family="sans-serif">PWR</text>
  <circle cx="20" cy="14.5" r="0.8" fill="#1e4a1e" stroke="#444" stroke-width="0.2"/>
  <text x="24" y="15.5" font-size="1.5" fill="#777" font-family="sans-serif">BUS</text>
  <!-- Column of 8 red LEDs -->
  <circle cx="9" cy="22" r="1.2" fill="#3a1e1e" stroke="#444" stroke-width="0.2"/>
  <circle cx="9" cy="27" r="1.2" fill="#3a1e1e" stroke="#444" stroke-width="0.2"/>
  <circle cx="9" cy="32" r="1.2" fill="#3a1e1e" stroke="#444" stroke-width="0.2"/>
  <circle cx="9" cy="37" r="1.2" fill="#3a1e1e" stroke="#444" stroke-width="0.2"/>
  <circle cx="9" cy="42" r="1.2" fill="#3a1e1e" stroke="#444" stroke-width="0.2"/>
  <circle cx="9" cy="47" r="1.2" fill="#3a1e1e" stroke="#444" stroke-width="0.2"/>
  <circle cx="9" cy="52" r="1.2" fill="#3a1e1e" stroke="#444" stroke-width="0.2"/>
  <circle cx="9" cy="57" r="1.2" fill="#3a1e1e" stroke="#444" stroke-width="0.2"/>
  <!-- Channel numbers -->
  <text x="16" y="23" font-size="1.5" fill="#777" font-family="sans-serif">1</text>
  <text x="16" y="28" font-size="1.5" fill="#777" font-family="sans-serif">2</text>
  <text x="16" y="33" font-size="1.5" fill="#777" font-family="sans-serif">3</text>
  <text x="16" y="38" font-size="1.5" fill="#777" font-family="sans-serif">4</text>
  <text x="16" y="43" font-size="1.5" fill="#777" font-family="sans-serif">5</text>
  <text x="16" y="48" font-size="1.5" fill="#777" font-family="sans-serif">6</text>
  <text x="16" y="53" font-size="1.5" fill="#777" font-family="sans-serif">7</text>
  <text x="16" y="58" font-size="1.5" fill="#777" font-family="sans-serif">8</text>
  <!-- Relay output terminals (heavier gauge) -->
  <rect x="3" y="62" width="24" height="16" rx="1" fill="#1a1a1a" stroke="#555" stroke-width="0.4"/>
  <circle cx="7" cy="67" r="2" fill="#444" stroke="#666" stroke-width="0.4"/>
  <circle cx="13" cy="67" r="2" fill="#444" stroke="#666" stroke-width="0.4"/>
  <circle cx="19" cy="67" r="2" fill="#444" stroke="#666" stroke-width="0.4"/>
  <circle cx="25" cy="67" r="2" fill="#444" stroke="#666" stroke-width="0.4"/>
  <circle cx="7" cy="74" r="2" fill="#444" stroke="#666" stroke-width="0.4"/>
  <circle cx="13" cy="74" r="2" fill="#444" stroke="#666" stroke-width="0.4"/>
  <circle cx="19" cy="74" r="2" fill="#444" stroke="#666" stroke-width="0.4"/>
  <circle cx="25" cy="74" r="2" fill="#444" stroke="#666" stroke-width="0.4"/>
  <!-- Backplane -->
  <rect x="3" y="84" width="24" height="13" rx="1" fill="#1a1a1a" stroke="#555" stroke-width="0.4"/>
  <rect x="5" y="86" width="20" height="9" rx="0.5" fill="#0a0a0a" stroke="#333" stroke-width="0.3"/>
</svg>