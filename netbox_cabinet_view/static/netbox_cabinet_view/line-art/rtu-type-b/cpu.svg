<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 100" width="50" height="100">
  <!-- RTU Type B CPU — wider industrial grey, SICAM-inspired -->
  <rect x="0.5" y="0.5" width="49" height="99" rx="1" fill="#3a3a3a" stroke="#666" stroke-width="0.5"/>
  <!-- Label strip -->
  <rect x="2" y="2" width="46" height="8" rx="0.5" fill="#444" stroke="#666" stroke-width="0.3"/>
  <text x="25" y="8" text-anchor="middle" font-size="3.5" fill="#bbb" font-family="sans-serif">CPU</text>
  <!-- Horizontal LCD strip -->
  <rect x="4" y="14" width="42" height="10" rx="1" fill="#0a0a12" stroke="#446" stroke-width="0.4"/>
  <text x="25" y="21" text-anchor="middle" font-size="3" fill="#5577aa" font-family="monospace">ONLINE</text>
  <!-- Row of 6 LEDs -->
  <rect x="4" y="28" width="42" height="8" rx="0.5" fill="#333" stroke="#555" stroke-width="0.3"/>
  <circle cx="9" cy="32" r="1.2" fill="#1e4a1e" stroke="#555" stroke-width="0.2"/>
  <circle cx="17" cy="32" r="1.2" fill="#1e4a1e" stroke="#555" stroke-width="0.2"/>
  <circle cx="25" cy="32" r="1.2" fill="#4a4a1e" stroke="#555" stroke-width="0.2"/>
  <circle cx="33" cy="32" r="1.2" fill="#4a1e1e" stroke="#555" stroke-width="0.2"/>
  <circle cx="39" cy="32" r="1.2" fill="#1e1e4a" stroke="#555" stroke-width="0.2"/>
  <circle cx="45" cy="32" r="1.2" fill="#1e1e4a" stroke="#555" stroke-width="0.2"/>
  <text x="9" y="29" text-anchor="middle" font-size="1.5" fill="#777" font-family="sans-serif">RUN</text>
  <text x="17" y="29" text-anchor="middle" font-size="1.5" fill="#777" font-family="sans-serif">COM</text>
  <text x="25" y="29" text-anchor="middle" font-size="1.5" fill="#777" font-family="sans-serif">WRN</text>
  <text x="33" y="29" text-anchor="middle" font-size="1.5" fill="#777" font-family="sans-serif">ERR</text>
  <text x="39" y="29" text-anchor="middle" font-size="1.3" fill="#777" font-family="sans-serif">I/O-A</text>
  <text x="45" y="29" text-anchor="middle" font-size="1.3" fill="#777" font-family="sans-serif">I/O-B</text>
  <!-- Two RJ45 Ethernet ports side-by-side -->
  <text x="16" y="42" text-anchor="middle" font-size="2" fill="#888" font-family="sans-serif">ETH1</text>
  <rect x="5" y="44" width="12" height="8" rx="1" fill="#111" stroke="#4a6a4a" stroke-width="0.4"/>
  <text x="34" y="42" text-anchor="middle" font-size="2" fill="#888" font-family="sans-serif">ETH2</text>
  <rect x="23" y="44" width="12" height="8" rx="1" fill="#111" stroke="#4a6a4a" stroke-width="0.4"/>
  <!-- DB9 serial -->
  <text x="44" y="42" text-anchor="middle" font-size="1.5" fill="#888" font-family="sans-serif">SER</text>
  <rect x="37" y="44" width="12" height="6" rx="1" fill="#111" stroke="#555" stroke-width="0.3"/>
  <rect x="39" y="46" width="8" height="2" rx="1" fill="#1a1a1a" stroke="#444" stroke-width="0.2"/>
  <!-- USB port -->
  <rect x="5" y="58" width="10" height="5" rx="0.5" fill="#111" stroke="#555" stroke-width="0.3"/>
  <text x="10" y="67" text-anchor="middle" font-size="2" fill="#777" font-family="sans-serif">USB</text>
  <!-- Backplane connector (wider) -->
  <rect x="4" y="80" width="42" height="16" rx="1" fill="#1a1a1a" stroke="#555" stroke-width="0.4"/>
  <rect x="6" y="82" width="38" height="12" rx="0.5" fill="#0a0a0a" stroke="#333" stroke-width="0.3"/>
</svg>