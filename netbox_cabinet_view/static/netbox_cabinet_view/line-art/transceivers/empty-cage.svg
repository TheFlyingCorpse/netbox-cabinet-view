<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 14 14" width="14" height="14">
  <!-- Empty SFP cage — no transceiver installed -->
  <rect x="0.5" y="0.5" width="13" height="13" rx="0.5" fill="#333" stroke="#555" stroke-width="0.4"/>
  <!-- Empty cage interior -->
  <rect x="2" y="2" width="10" height="10" rx="0.3" fill="#1a1a1a" stroke="#444" stroke-width="0.3"/>
  <!-- Guide rails visible inside -->
  <line x1="3" y1="4" x2="3" y2="10" stroke="#444" stroke-width="0.3"/>
  <line x1="11" y1="4" x2="11" y2="10" stroke="#444" stroke-width="0.3"/>
</svg>
