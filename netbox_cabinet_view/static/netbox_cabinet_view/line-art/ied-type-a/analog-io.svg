<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 100" width="30" height="100">
  <!-- Type C analog I/O — inspired by ABB REL-style, heavier terminal block emphasis -->
  <rect x="0.5" y="0.5" width="29" height="99" rx="1" fill="#2a2520" stroke="#555" stroke-width="0.5"/>
  <!-- Label -->
  <rect x="2" y="2" width="26" height="8" rx="0.5" fill="#332820" stroke="#664" stroke-width="0.3"/>
  <text x="15" y="8" text-anchor="middle" font-size="3.2" fill="#da8" font-family="sans-serif">ANA IN</text>
  <!-- 4 analog channel LEDs with labels -->
  <text x="15" y="17" text-anchor="middle" font-size="2.5" fill="#888" font-family="sans-serif">CHANNELS</text>
  <rect x="4" y="20" width="5" height="3" rx="0.3" fill="#1e3a1e" stroke="#444" stroke-width="0.2"/>
  <text x="13" y="23" font-size="2" fill="#666" font-family="sans-serif">CH1</text>
  <rect x="4" y="25" width="5" height="3" rx="0.3" fill="#1e3a1e" stroke="#444" stroke-width="0.2"/>
  <text x="13" y="28" font-size="2" fill="#666" font-family="sans-serif">CH2</text>
  <rect x="4" y="30" width="5" height="3" rx="0.3" fill="#1e3a1e" stroke="#444" stroke-width="0.2"/>
  <text x="13" y="33" font-size="2" fill="#666" font-family="sans-serif">CH3</text>
  <rect x="4" y="35" width="5" height="3" rx="0.3" fill="#1e3a1e" stroke="#444" stroke-width="0.2"/>
  <text x="13" y="38" font-size="2" fill="#666" font-family="sans-serif">CH4</text>
  <!-- Heavy-duty terminal block area (CT/PT inputs) -->
  <rect x="3" y="44" width="24" height="34" rx="1" fill="#1a1815" stroke="#555" stroke-width="0.4"/>
  <text x="15" y="51" text-anchor="middle" font-size="2.5" fill="#777" font-family="sans-serif">CT/PT</text>
  <!-- Screw terminals 4x3 grid -->
  <circle cx="8" cy="57" r="2" fill="#555" stroke="#777" stroke-width="0.3"/>
  <circle cx="15" cy="57" r="2" fill="#555" stroke="#777" stroke-width="0.3"/>
  <circle cx="22" cy="57" r="2" fill="#555" stroke="#777" stroke-width="0.3"/>
  <circle cx="8" cy="64" r="2" fill="#555" stroke="#777" stroke-width="0.3"/>
  <circle cx="15" cy="64" r="2" fill="#555" stroke="#777" stroke-width="0.3"/>
  <circle cx="22" cy="64" r="2" fill="#555" stroke="#777" stroke-width="0.3"/>
  <circle cx="8" cy="71" r="2" fill="#555" stroke="#777" stroke-width="0.3"/>
  <circle cx="15" cy="71" r="2" fill="#555" stroke="#777" stroke-width="0.3"/>
  <circle cx="22" cy="71" r="2" fill="#555" stroke="#777" stroke-width="0.3"/>
  <!-- Backplane -->
  <rect x="3" y="84" width="24" height="13" rx="1" fill="#1a1a1a" stroke="#555" stroke-width="0.4"/>
  <rect x="5" y="86" width="20" height="9" rx="0.5" fill="#0a0a0a" stroke="#333" stroke-width="0.3"/>
</svg>
