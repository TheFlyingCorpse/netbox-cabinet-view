<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 100" width="30" height="100">
  <!-- Generic IED binary I/O module — line art, no vendor marks -->
  <rect x="0.5" y="0.5" width="29" height="99" rx="1" fill="#2a2a20" stroke="#555" stroke-width="0.5"/>
  <!-- Top label -->
  <rect x="3" y="3" width="24" height="12" rx="1" fill="#333320" stroke="#665" stroke-width="0.3"/>
  <text x="15" y="10" text-anchor="middle" font-size="3.5" fill="#cc8" font-family="sans-serif">BIN I/O</text>
  <!-- 8 input LEDs (top bank) -->
  <text x="15" y="21" text-anchor="middle" font-size="2.5" fill="#888" font-family="sans-serif">INPUTS</text>
  <circle cx="6" cy="26" r="1.2" fill="#1e3a1e" stroke="#444" stroke-width="0.2"/>
  <circle cx="10" cy="26" r="1.2" fill="#1e3a1e" stroke="#444" stroke-width="0.2"/>
  <circle cx="14" cy="26" r="1.2" fill="#1e3a1e" stroke="#444" stroke-width="0.2"/>
  <circle cx="18" cy="26" r="1.2" fill="#1e3a1e" stroke="#444" stroke-width="0.2"/>
  <circle cx="22" cy="26" r="1.2" fill="#1e3a1e" stroke="#444" stroke-width="0.2"/>
  <circle cx="6" cy="31" r="1.2" fill="#1e3a1e" stroke="#444" stroke-width="0.2"/>
  <circle cx="10" cy="31" r="1.2" fill="#1e3a1e" stroke="#444" stroke-width="0.2"/>
  <circle cx="14" cy="31" r="1.2" fill="#1e3a1e" stroke="#444" stroke-width="0.2"/>
  <!-- 8 output LEDs (bottom bank) -->
  <text x="15" y="41" text-anchor="middle" font-size="2.5" fill="#888" font-family="sans-serif">OUTPUTS</text>
  <circle cx="6" cy="46" r="1.2" fill="#3a1e1e" stroke="#444" stroke-width="0.2"/>
  <circle cx="10" cy="46" r="1.2" fill="#3a1e1e" stroke="#444" stroke-width="0.2"/>
  <circle cx="14" cy="46" r="1.2" fill="#3a1e1e" stroke="#444" stroke-width="0.2"/>
  <circle cx="18" cy="46" r="1.2" fill="#3a1e1e" stroke="#444" stroke-width="0.2"/>
  <circle cx="22" cy="46" r="1.2" fill="#3a1e1e" stroke="#444" stroke-width="0.2"/>
  <circle cx="6" cy="51" r="1.2" fill="#3a1e1e" stroke="#444" stroke-width="0.2"/>
  <circle cx="10" cy="51" r="1.2" fill="#3a1e1e" stroke="#444" stroke-width="0.2"/>
  <circle cx="14" cy="51" r="1.2" fill="#3a1e1e" stroke="#444" stroke-width="0.2"/>
  <!-- Terminal block area -->
  <rect x="3" y="58" width="24" height="22" rx="1" fill="#1a1a1a" stroke="#555" stroke-width="0.4"/>
  <!-- 8 screw terminals -->
  <circle cx="7" cy="63" r="1.5" fill="#444" stroke="#666" stroke-width="0.3"/>
  <circle cx="13" cy="63" r="1.5" fill="#444" stroke="#666" stroke-width="0.3"/>
  <circle cx="19" cy="63" r="1.5" fill="#444" stroke="#666" stroke-width="0.3"/>
  <circle cx="25" cy="63" r="1.5" fill="#444" stroke="#666" stroke-width="0.3"/>
  <circle cx="7" cy="72" r="1.5" fill="#444" stroke="#666" stroke-width="0.3"/>
  <circle cx="13" cy="72" r="1.5" fill="#444" stroke="#666" stroke-width="0.3"/>
  <circle cx="19" cy="72" r="1.5" fill="#444" stroke="#666" stroke-width="0.3"/>
  <circle cx="25" cy="72" r="1.5" fill="#444" stroke="#666" stroke-width="0.3"/>
  <!-- Bottom backplane connector -->
  <rect x="3" y="84" width="24" height="13" rx="1" fill="#1a1a1a" stroke="#555" stroke-width="0.4"/>
  <rect x="5" y="86" width="20" height="9" rx="0.5" fill="#0a0a0a" stroke="#333" stroke-width="0.3"/>
</svg>
