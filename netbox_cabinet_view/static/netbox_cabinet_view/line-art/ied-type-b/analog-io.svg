<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 100" width="30" height="100">
  <!-- Type B Analog I/O — bar-graph indicators, CT/PT terminals -->
  <rect x="0.5" y="0.5" width="29" height="99" rx="1" fill="#2a2a20" stroke="#555" stroke-width="0.5"/>
  <!-- Label strip -->
  <rect x="2" y="2" width="26" height="8" rx="0.5" fill="#333320" stroke="#665" stroke-width="0.3"/>
  <text x="15" y="8" text-anchor="middle" font-size="3.5" fill="#cc8" font-family="sans-serif">ANA</text>
  <!-- 4 bar-graph channel indicators -->
  <rect x="5" y="14" width="3" height="20" rx="0.5" fill="#111" stroke="#444" stroke-width="0.2"/>
  <rect x="5" y="26" width="3" height="8" rx="0.3" fill="#2a4a3a" opacity="0.8"/>
  <rect x="11" y="14" width="3" height="20" rx="0.5" fill="#111" stroke="#444" stroke-width="0.2"/>
  <rect x="11" y="22" width="3" height="12" rx="0.3" fill="#2a4a3a" opacity="0.8"/>
  <rect x="17" y="14" width="3" height="20" rx="0.5" fill="#111" stroke="#444" stroke-width="0.2"/>
  <rect x="17" y="28" width="3" height="6" rx="0.3" fill="#2a4a3a" opacity="0.8"/>
  <rect x="23" y="14" width="3" height="20" rx="0.5" fill="#111" stroke="#444" stroke-width="0.2"/>
  <rect x="23" y="20" width="3" height="14" rx="0.3" fill="#2a4a3a" opacity="0.8"/>
  <!-- Channel labels -->
  <text x="6.5" y="39" text-anchor="middle" font-size="1.8" fill="#666" font-family="sans-serif">1</text>
  <text x="12.5" y="39" text-anchor="middle" font-size="1.8" fill="#666" font-family="sans-serif">2</text>
  <text x="18.5" y="39" text-anchor="middle" font-size="1.8" fill="#666" font-family="sans-serif">3</text>
  <text x="24.5" y="39" text-anchor="middle" font-size="1.8" fill="#666" font-family="sans-serif">4</text>
  <!-- CT/PT terminal block (heavier terminals) -->
  <rect x="3" y="43" width="24" height="34" rx="1" fill="#1a1a1a" stroke="#555" stroke-width="0.4"/>
  <text x="15" y="48" text-anchor="middle" font-size="2" fill="#888" font-family="sans-serif">CT/PT</text>
  <circle cx="8" cy="54" r="2.2" fill="#444" stroke="#666" stroke-width="0.4"/>
  <circle cx="15" cy="54" r="2.2" fill="#444" stroke="#666" stroke-width="0.4"/>
  <circle cx="22" cy="54" r="2.2" fill="#444" stroke="#666" stroke-width="0.4"/>
  <circle cx="8" cy="63" r="2.2" fill="#444" stroke="#666" stroke-width="0.4"/>
  <circle cx="15" cy="63" r="2.2" fill="#444" stroke="#666" stroke-width="0.4"/>
  <circle cx="22" cy="63" r="2.2" fill="#444" stroke="#666" stroke-width="0.4"/>
  <circle cx="8" cy="72" r="2.2" fill="#444" stroke="#666" stroke-width="0.4"/>
  <circle cx="15" cy="72" r="2.2" fill="#444" stroke="#666" stroke-width="0.4"/>
  <!-- Backplane connector -->
  <rect x="3" y="84" width="24" height="13" rx="1" fill="#1a1a1a" stroke="#555" stroke-width="0.4"/>
  <rect x="5" y="86" width="20" height="9" rx="0.5" fill="#0a0a0a" stroke="#333" stroke-width="0.3"/>
</svg>