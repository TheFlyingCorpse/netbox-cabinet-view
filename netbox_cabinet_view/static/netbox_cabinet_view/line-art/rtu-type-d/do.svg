<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 100" width="24" height="100">
  <!-- RTU Type D DO — light body, red band, relay LEDs -->
  <rect x="0.5" y="0.5" width="23" height="99" rx="1" fill="#ccc8bc" stroke="#999" stroke-width="0.5"/>
  <!-- Red band at top -->
  <rect x="0.5" y="0.5" width="23" height="10" rx="1" fill="#8a2a2a" stroke="#999" stroke-width="0.5"/>
  <text x="12" y="7.5" text-anchor="middle" font-size="3.5" fill="#fff" font-family="sans-serif" font-weight="bold">DO</text>
  <!-- 4 relay LEDs -->
  <circle cx="12" cy="17" r="1.2" fill="#6a2a2a" stroke="#888" stroke-width="0.2"/>
  <circle cx="12" cy="23" r="1.2" fill="#6a2a2a" stroke="#888" stroke-width="0.2"/>
  <circle cx="12" cy="29" r="1.2" fill="#6a2a2a" stroke="#888" stroke-width="0.2"/>
  <circle cx="12" cy="35" r="1.2" fill="#6a2a2a" stroke="#888" stroke-width="0.2"/>
  <text x="18" y="18" font-size="1.5" fill="#777" font-family="sans-serif">1</text>
  <text x="18" y="24" font-size="1.5" fill="#777" font-family="sans-serif">2</text>
  <text x="18" y="30" font-size="1.5" fill="#777" font-family="sans-serif">3</text>
  <text x="18" y="36" font-size="1.5" fill="#777" font-family="sans-serif">4</text>
  <!-- Heavier relay terminals -->
  <rect x="3" y="42" width="18" height="24" rx="1" fill="#bbb8a8" stroke="#999" stroke-width="0.3"/>
  <circle cx="8" cy="48" r="2" fill="#888" stroke="#777" stroke-width="0.3"/>
  <circle cx="16" cy="48" r="2" fill="#888" stroke="#777" stroke-width="0.3"/>
  <circle cx="8" cy="56" r="2" fill="#888" stroke="#777" stroke-width="0.3"/>
  <circle cx="16" cy="56" r="2" fill="#888" stroke="#777" stroke-width="0.3"/>
  <!-- DIN rail clip -->
  <rect x="3" y="85" width="18" height="12" rx="0.5" fill="#aaa8a0" stroke="#888" stroke-width="0.4"/>
  <rect x="5" y="87" width="14" height="8" rx="1" fill="#999" stroke="#777" stroke-width="0.3"/>
</svg>