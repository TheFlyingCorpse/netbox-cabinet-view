<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 100" width="30" height="100">
  <!-- Type D I/O — compact, mixed input/output LEDs, spring-cage -->
  <rect x="0.5" y="0.5" width="29" height="99" rx="1" fill="#25252e" stroke="#556" stroke-width="0.5"/>
  <!-- Label strip -->
  <rect x="2" y="2" width="26" height="8" rx="0.5" fill="#2e2e38" stroke="#556" stroke-width="0.3"/>
  <text x="15" y="8" text-anchor="middle" font-size="3.5" fill="#99a" font-family="sans-serif">I/O</text>
  <!-- Input LEDs (green, left column) -->
  <text x="9" y="16" text-anchor="middle" font-size="1.8" fill="#667" font-family="sans-serif">IN</text>
  <circle cx="9" cy="20" r="1.2" fill="#1e3a1e" stroke="#444" stroke-width="0.2"/>
  <circle cx="9" cy="25" r="1.2" fill="#1e3a1e" stroke="#444" stroke-width="0.2"/>
  <circle cx="9" cy="30" r="1.2" fill="#1e3a1e" stroke="#444" stroke-width="0.2"/>
  <circle cx="9" cy="35" r="1.2" fill="#1e3a1e" stroke="#444" stroke-width="0.2"/>
  <!-- Output LEDs (red, right column) -->
  <text x="21" y="16" text-anchor="middle" font-size="1.8" fill="#667" font-family="sans-serif">OUT</text>
  <circle cx="21" cy="20" r="1.2" fill="#3a1e1e" stroke="#444" stroke-width="0.2"/>
  <circle cx="21" cy="25" r="1.2" fill="#3a1e1e" stroke="#444" stroke-width="0.2"/>
  <circle cx="21" cy="30" r="1.2" fill="#3a1e1e" stroke="#444" stroke-width="0.2"/>
  <circle cx="21" cy="35" r="1.2" fill="#3a1e1e" stroke="#444" stroke-width="0.2"/>
  <!-- Spring-cage terminal block (8 positions) -->
  <rect x="3" y="42" width="24" height="34" rx="1" fill="#1a1a1a" stroke="#555" stroke-width="0.4"/>
  <!-- Spring-cage terminals (rectangular, not screw) -->
  <rect x="5" y="45" width="8" height="3" rx="0.3" fill="#444" stroke="#666" stroke-width="0.3"/>
  <rect x="17" y="45" width="8" height="3" rx="0.3" fill="#444" stroke="#666" stroke-width="0.3"/>
  <rect x="5" y="50" width="8" height="3" rx="0.3" fill="#444" stroke="#666" stroke-width="0.3"/>
  <rect x="17" y="50" width="8" height="3" rx="0.3" fill="#444" stroke="#666" stroke-width="0.3"/>
  <rect x="5" y="55" width="8" height="3" rx="0.3" fill="#444" stroke="#666" stroke-width="0.3"/>
  <rect x="17" y="55" width="8" height="3" rx="0.3" fill="#444" stroke="#666" stroke-width="0.3"/>
  <rect x="5" y="60" width="8" height="3" rx="0.3" fill="#444" stroke="#666" stroke-width="0.3"/>
  <rect x="17" y="60" width="8" height="3" rx="0.3" fill="#444" stroke="#666" stroke-width="0.3"/>
  <!-- Backplane connector -->
  <rect x="3" y="84" width="24" height="13" rx="1" fill="#1a1a1a" stroke="#555" stroke-width="0.4"/>
  <rect x="5" y="86" width="20" height="9" rx="0.5" fill="#0a0a0a" stroke="#333" stroke-width="0.3"/>
</svg>