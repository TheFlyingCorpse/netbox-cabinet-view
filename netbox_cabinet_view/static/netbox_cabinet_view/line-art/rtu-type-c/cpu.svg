<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 100" width="50" height="100">
  <!-- RTU Type C CPU — beige/cream, blue band, DIN-mount -->
  <rect x="0.5" y="0.5" width="49" height="99" rx="1" fill="#d0ccc0" stroke="#999" stroke-width="0.5"/>
  <!-- Blue band at top -->
  <rect x="0.5" y="0.5" width="49" height="10" rx="1" fill="#2a5a8a" stroke="#999" stroke-width="0.5"/>
  <text x="25" y="7.5" text-anchor="middle" font-size="4" fill="#fff" font-family="sans-serif" font-weight="bold">CPU</text>
  <!-- LCD display -->
  <rect x="6" y="14" width="38" height="10" rx="1" fill="#0a1a0a" stroke="#4a6a4a" stroke-width="0.4"/>
  <text x="25" y="21" text-anchor="middle" font-size="3" fill="#4a8a4a" font-family="monospace">192.168.0.1</text>
  <!-- Nav buttons -->
  <rect x="10" y="28" width="6" height="4" rx="0.5" fill="#bbb8a8" stroke="#999" stroke-width="0.3"/>
  <rect x="19" y="28" width="6" height="4" rx="0.5" fill="#bbb8a8" stroke="#999" stroke-width="0.3"/>
  <rect x="28" y="28" width="6" height="4" rx="0.5" fill="#bbb8a8" stroke="#999" stroke-width="0.3"/>
  <rect x="37" y="28" width="6" height="4" rx="0.5" fill="#bbb8a8" stroke="#999" stroke-width="0.3"/>
  <!-- Status LEDs -->
  <rect x="6" y="36" width="38" height="7" rx="0.5" fill="#c8c4b8" stroke="#aaa" stroke-width="0.3"/>
  <circle cx="12" cy="39.5" r="1.2" fill="#2a6a2a" stroke="#888" stroke-width="0.2"/>
  <circle cx="20" cy="39.5" r="1.2" fill="#2a6a2a" stroke="#888" stroke-width="0.2"/>
  <circle cx="28" cy="39.5" r="1.2" fill="#6a6a2a" stroke="#888" stroke-width="0.2"/>
  <circle cx="36" cy="39.5" r="1.2" fill="#6a2a2a" stroke="#888" stroke-width="0.2"/>
  <text x="12" y="37" text-anchor="middle" font-size="1.5" fill="#777" font-family="sans-serif">RUN</text>
  <text x="20" y="37" text-anchor="middle" font-size="1.5" fill="#777" font-family="sans-serif">COM</text>
  <text x="28" y="37" text-anchor="middle" font-size="1.5" fill="#777" font-family="sans-serif">WRN</text>
  <text x="36" y="37" text-anchor="middle" font-size="1.5" fill="#777" font-family="sans-serif">ERR</text>
  <!-- Two Ethernet ports -->
  <text x="16" y="50" text-anchor="middle" font-size="2" fill="#777" font-family="sans-serif">ETH1</text>
  <rect x="6" y="52" width="12" height="8" rx="1" fill="#111" stroke="#4a6a4a" stroke-width="0.4"/>
  <text x="34" y="50" text-anchor="middle" font-size="2" fill="#777" font-family="sans-serif">ETH2</text>
  <rect x="24" y="52" width="12" height="8" rx="1" fill="#111" stroke="#4a6a4a" stroke-width="0.4"/>
  <!-- Serial port -->
  <text x="44" y="50" text-anchor="middle" font-size="1.5" fill="#777" font-family="sans-serif">SER</text>
  <rect x="38" y="52" width="10" height="6" rx="1" fill="#111" stroke="#555" stroke-width="0.3"/>
  <!-- Label area -->
  <rect x="6" y="66" width="38" height="6" rx="0.5" fill="#fff" stroke="#bbb" stroke-width="0.3"/>
  <text x="25" y="71" text-anchor="middle" font-size="2.5" fill="#555" font-family="sans-serif">IEC 61850 / 104</text>
  <!-- DIN rail clip -->
  <rect x="6" y="82" width="38" height="14" rx="0.5" fill="#aaa8a0" stroke="#888" stroke-width="0.4"/>
  <rect x="10" y="85" width="30" height="8" rx="1" fill="#999" stroke="#777" stroke-width="0.3"/>
</svg>