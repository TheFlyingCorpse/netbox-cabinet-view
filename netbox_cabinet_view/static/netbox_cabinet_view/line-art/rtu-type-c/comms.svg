<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 100" width="30" height="100">
  <!-- RTU Type C Comms — beige, blue band, dual ETH + SFP + serial -->
  <rect x="0.5" y="0.5" width="29" height="99" rx="1" fill="#d0ccc0" stroke="#999" stroke-width="0.5"/>
  <!-- Blue band at top -->
  <rect x="0.5" y="0.5" width="29" height="10" rx="1" fill="#2a5a8a" stroke="#999" stroke-width="0.5"/>
  <text x="15" y="7.5" text-anchor="middle" font-size="3.5" fill="#fff" font-family="sans-serif" font-weight="bold">COM</text>
  <!-- RJ45 port 1 -->
  <text x="15" y="17" text-anchor="middle" font-size="1.8" fill="#777" font-family="sans-serif">ETH1</text>
  <rect x="5" y="19" width="14" height="8" rx="1" fill="#111" stroke="#4a6a4a" stroke-width="0.4"/>
  <circle cx="21" cy="22" r="0.8" fill="#2a6a2a" stroke="#888" stroke-width="0.2"/>
  <!-- RJ45 port 2 -->
  <text x="15" y="33" text-anchor="middle" font-size="1.8" fill="#777" font-family="sans-serif">ETH2</text>
  <rect x="5" y="35" width="14" height="8" rx="1" fill="#111" stroke="#4a6a4a" stroke-width="0.4"/>
  <circle cx="21" cy="38" r="0.8" fill="#2a6a2a" stroke="#888" stroke-width="0.2"/>
  <!-- SFP cage -->
  <text x="15" y="50" text-anchor="middle" font-size="1.8" fill="#777" font-family="sans-serif">SFP</text>
  <rect x="5" y="52" width="20" height="10" rx="0.5" fill="#222" stroke="#888" stroke-width="0.4"/>
  <rect x="7" y="54" width="16" height="6" rx="0.5" fill="#1a1a1a" stroke="#666" stroke-width="0.2"/>
  <!-- Serial port -->
  <text x="15" y="68" text-anchor="middle" font-size="1.8" fill="#777" font-family="sans-serif">SER</text>
  <rect x="5" y="70" width="20" height="6" rx="1" fill="#111" stroke="#888" stroke-width="0.3"/>
  <rect x="8" y="72" width="14" height="2" rx="1" fill="#1a1a1a" stroke="#666" stroke-width="0.2"/>
  <!-- DIN rail clip -->
  <rect x="3" y="85" width="24" height="12" rx="0.5" fill="#aaa8a0" stroke="#888" stroke-width="0.4"/>
  <rect x="6" y="87" width="18" height="8" rx="1" fill="#999" stroke="#777" stroke-width="0.3"/>
</svg>