  <!-- Mounting hole right -->
  <circle cx="48" cy="12" r="2.5" fill="none" stroke="#8a5520" stroke-width="0.5"/>
  <circle cx="48" cy="12" r="0.8" fill="#8a5520"/>
  <!-- Surface highlight -->
