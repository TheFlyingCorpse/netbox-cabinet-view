<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 60">
  <!-- Generic power distribution block — de-branded -->
  <rect x="0.5" y="0.5" width="39" height="59" rx="1" fill="#2a2a2a" stroke="#555" stroke-width="0.5"/>
  <!-- Large input terminal at top -->
  <rect x="10" y="3" width="20" height="8" rx="1" fill="#333" stroke="#666" stroke-width="0.3"/>
  <circle cx="20" cy="7" r="2.5" fill="#c0c0c0" stroke="#888" stroke-width="0.3"/>
  <line x1="18.5" y1="5.5" x2="21.5" y2="8.5" stroke="#666" stroke-width="0.4"/>
  <!-- Rating label -->
  <text x="20" y="18" text-anchor="middle" font-size="3.5" fill="#aaa" font-family="sans-serif" font-weight="bold">125A</text>
  <!-- 4 output terminals -->
  <rect x="3" y="24" width="7" height="6" rx="0.5" fill="#333" stroke="#666" stroke-width="0.2"/>
  <circle cx="6.5" cy="27" r="1.5" fill="#c0c0c0" stroke="#888" stroke-width="0.2"/>
  <rect x="12" y="24" width="7" height="6" rx="0.5" fill="#333" stroke="#666" stroke-width="0.2"/>
  <circle cx="15.5" cy="27" r="1.5" fill="#c0c0c0" stroke="#888" stroke-width="0.2"/>
  <rect x="21" y="24" width="7" height="6" rx="0.5" fill="#333" stroke="#666" stroke-width="0.2"/>
  <circle cx="24.5" cy="27" r="1.5" fill="#c0c0c0" stroke="#888" stroke-width="0.2"/>
  <rect x="30" y="24" width="7" height="6" rx="0.5" fill="#333" stroke="#666" stroke-width="0.2"/>
  <circle cx="33.5" cy="27" r="1.5" fill="#c0c0c0" stroke="#888" stroke-width="0.2"/>
  <!-- Internal bus bar visible -->
  <rect x="5" y="20" width="30" height="2" rx="0.3" fill="#c47a2c" stroke="#8a5520" stroke-width="0.2"/>
  <!-- DIN clip -->
  <rect x="8" y="51" width="24" height="5" rx="1" fill="#444" stroke="#555" stroke-width="0.3"/>
  <line x1="12" y1="53.5" x2="28" y2="53.5" stroke="#555" stroke-width="0.3"/>
</svg>