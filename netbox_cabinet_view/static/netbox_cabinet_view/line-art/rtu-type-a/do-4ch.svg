<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 100" width="24" height="100">
  <!-- RTU/PLC DO module — DIN-mount, relay output style -->
  <!-- Inspired by compact fieldbus I/O (Netcontrol/Sprecher-style) -->
  <rect x="0.5" y="0.5" width="23" height="99" rx="0.5" fill="#e8e4d8" stroke="#999" stroke-width="0.5"/>
  <!-- Top color band (red = digital output convention) -->
  <rect x="0.5" y="0.5" width="23" height="8" rx="0.5" fill="#b83030" stroke="#999" stroke-width="0.5"/>
  <text x="12" y="6" text-anchor="middle" font-size="3.5" fill="#fff" font-family="sans-serif" font-weight="bold">DO</text>
  <!-- Channel status LEDs (4 relay outputs) -->
  <circle cx="6" cy="14" r="1.5" fill="#6a2a2a" stroke="#888" stroke-width="0.2"/>
  <circle cx="12" cy="14" r="1.5" fill="#6a2a2a" stroke="#888" stroke-width="0.2"/>
  <circle cx="6" cy="21" r="1.5" fill="#6a2a2a" stroke="#888" stroke-width="0.2"/>
  <circle cx="12" cy="21" r="1.5" fill="#6a2a2a" stroke="#888" stroke-width="0.2"/>
  <text x="18" y="15" font-size="2" fill="#666" font-family="sans-serif">1-2</text>
  <text x="18" y="22" font-size="2" fill="#666" font-family="sans-serif">3-4</text>
  <!-- Bus/power status -->
  <rect x="3" y="28" width="18" height="6" rx="0.5" fill="#ddd8cc" stroke="#aaa" stroke-width="0.3"/>
  <circle cx="7" cy="31" r="1" fill="#2a6a2a" stroke="#888" stroke-width="0.2"/>
  <circle cx="12" cy="31" r="1" fill="#6a6a2a" stroke="#888" stroke-width="0.2"/>
  <circle cx="17" cy="31" r="1" fill="#6a2a2a" stroke="#888" stroke-width="0.2"/>
  <!-- Relay output terminals (heavier gauge) -->
  <rect x="2" y="38" width="20" height="32" rx="0.5" fill="#ccc8bc" stroke="#999" stroke-width="0.3"/>
  <text x="12" y="44" text-anchor="middle" font-size="2" fill="#777" font-family="sans-serif">RELAY</text>
  <circle cx="7" cy="50" r="2.5" fill="#666" stroke="#888" stroke-width="0.3"/>
  <circle cx="17" cy="50" r="2.5" fill="#666" stroke="#888" stroke-width="0.3"/>
  <circle cx="7" cy="60" r="2.5" fill="#666" stroke="#888" stroke-width="0.3"/>
  <circle cx="17" cy="60" r="2.5" fill="#666" stroke="#888" stroke-width="0.3"/>
  <!-- Label -->
  <rect x="3" y="74" width="18" height="10" rx="0.5" fill="#fff" stroke="#bbb" stroke-width="0.3"/>
  <text x="12" y="81" text-anchor="middle" font-size="2.8" fill="#555" font-family="sans-serif">4×DO Relay</text>
  <!-- DIN rail clip -->
  <rect x="2" y="86" width="20" height="12" rx="0.5" fill="#aaa8a0" stroke="#888" stroke-width="0.4"/>
  <rect x="5" y="89" width="14" height="6" rx="1" fill="#999" stroke="#777" stroke-width="0.3"/>
</svg>
