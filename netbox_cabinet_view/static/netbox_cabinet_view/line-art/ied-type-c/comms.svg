<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 100" width="40" height="100">
  <!-- Type C Comms — wider, dual RJ45 + DB9 + SFP, warm tones -->
  <rect x="0.5" y="0.5" width="39" height="99" rx="1" fill="#2a2520" stroke="#665" stroke-width="0.5"/>
  <!-- Label strip -->
  <rect x="2" y="2" width="36" height="8" rx="0.5" fill="#3a3530" stroke="#776" stroke-width="0.3"/>
  <text x="20" y="8" text-anchor="middle" font-size="3.5" fill="#cba" font-family="sans-serif">COMMS</text>
  <!-- RJ45 port 1 -->
  <text x="12" y="16" text-anchor="middle" font-size="1.8" fill="#776" font-family="sans-serif">ETH1</text>
  <rect x="4" y="18" width="16" height="10" rx="1" fill="#0a0a0a" stroke="#555" stroke-width="0.4"/>
  <rect x="6" y="20" width="12" height="6" rx="0.5" fill="#111" stroke="#333" stroke-width="0.2"/>
  <circle cx="5" cy="31" r="0.8" fill="#1e3a1e" stroke="#444" stroke-width="0.2"/>
  <circle cx="19" cy="31" r="0.8" fill="#1e3a3a" stroke="#444" stroke-width="0.2"/>
  <!-- RJ45 port 2 -->
  <text x="12" y="36" text-anchor="middle" font-size="1.8" fill="#776" font-family="sans-serif">ETH2</text>
  <rect x="4" y="38" width="16" height="10" rx="1" fill="#0a0a0a" stroke="#555" stroke-width="0.4"/>
  <rect x="6" y="40" width="12" height="6" rx="0.5" fill="#111" stroke="#333" stroke-width="0.2"/>
  <circle cx="5" cy="51" r="0.8" fill="#1e3a1e" stroke="#444" stroke-width="0.2"/>
  <circle cx="19" cy="51" r="0.8" fill="#1e3a3a" stroke="#444" stroke-width="0.2"/>
  <!-- DB9 serial -->
  <text x="32" y="16" text-anchor="middle" font-size="1.8" fill="#776" font-family="sans-serif">SER</text>
  <rect x="24" y="18" width="14" height="8" rx="1" fill="#0a0a0a" stroke="#555" stroke-width="0.3"/>
  <rect x="26" y="20" width="10" height="4" rx="2" fill="#1a1a1a" stroke="#444" stroke-width="0.2"/>
  <!-- SFP cage -->
  <text x="32" y="32" text-anchor="middle" font-size="1.8" fill="#776" font-family="sans-serif">SFP</text>
  <rect x="24" y="34" width="14" height="14" rx="0.5" fill="#111" stroke="#555" stroke-width="0.4"/>
  <rect x="26" y="36" width="10" height="10" rx="0.5" fill="#1a1a1a" stroke="#444" stroke-width="0.2"/>
  <!-- Link LEDs -->
  <circle cx="28" cy="52" r="0.8" fill="#1e3a1e" stroke="#444" stroke-width="0.2"/>
  <text x="33" y="53" font-size="1.5" fill="#665" font-family="sans-serif">LNK</text>
  <!-- Status area -->
  <rect x="4" y="56" width="32" height="6" rx="0.5" fill="#222018" stroke="#555" stroke-width="0.3"/>
  <circle cx="10" cy="59" r="1" fill="#1e4a1e" stroke="#444" stroke-width="0.2"/>
  <text x="16" y="60" font-size="1.8" fill="#665" font-family="sans-serif">PWR</text>
  <circle cx="26" cy="59" r="1" fill="#1e4a1e" stroke="#444" stroke-width="0.2"/>
  <text x="32" y="60" font-size="1.8" fill="#665" font-family="sans-serif">BUS</text>
  <!-- Backplane connector -->
  <rect x="4" y="84" width="32" height="13" rx="1" fill="#1a1a1a" stroke="#555" stroke-width="0.4"/>
  <rect x="6" y="86" width="28" height="9" rx="0.5" fill="#0a0a0a" stroke="#333" stroke-width="0.3"/>
</svg>