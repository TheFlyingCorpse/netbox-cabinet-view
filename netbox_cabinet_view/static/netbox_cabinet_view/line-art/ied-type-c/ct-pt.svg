<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 100" width="30" height="100">
  <!-- Type C CT/PT module — heavy terminals, warm tones -->
  <rect x="0.5" y="0.5" width="29" height="99" rx="1" fill="#2a2520" stroke="#665" stroke-width="0.5"/>
  <!-- Label strip -->
  <rect x="2" y="2" width="26" height="8" rx="0.5" fill="#3a3530" stroke="#776" stroke-width="0.3"/>
  <text x="15" y="8" text-anchor="middle" font-size="3.5" fill="#cba" font-family="sans-serif">CT/PT</text>
  <!-- 4 channel-active LEDs -->
  <circle cx="6" cy="15" r="1.2" fill="#1e4a1e" stroke="#444" stroke-width="0.2"/>
  <circle cx="12" cy="15" r="1.2" fill="#1e4a1e" stroke="#444" stroke-width="0.2"/>
  <circle cx="18" cy="15" r="1.2" fill="#1e4a1e" stroke="#444" stroke-width="0.2"/>
  <circle cx="24" cy="15" r="1.2" fill="#1e4a1e" stroke="#444" stroke-width="0.2"/>
  <text x="6" y="20" text-anchor="middle" font-size="1.5" fill="#665" font-family="sans-serif">1</text>
  <text x="12" y="20" text-anchor="middle" font-size="1.5" fill="#665" font-family="sans-serif">2</text>
  <text x="18" y="20" text-anchor="middle" font-size="1.5" fill="#665" font-family="sans-serif">3</text>
  <text x="24" y="20" text-anchor="middle" font-size="1.5" fill="#665" font-family="sans-serif">4</text>
  <!-- Large terminal block area — 3x4 grid of heavy terminals -->
  <rect x="3" y="24" width="24" height="55" rx="1" fill="#1a1a18" stroke="#555" stroke-width="0.4"/>
  <!-- Row 1 -->
  <circle cx="8" cy="31" r="2.5" fill="#444" stroke="#666" stroke-width="0.4"/>
  <circle cx="15" cy="31" r="2.5" fill="#444" stroke="#666" stroke-width="0.4"/>
  <circle cx="22" cy="31" r="2.5" fill="#444" stroke="#666" stroke-width="0.4"/>
  <!-- Row 2 -->
  <circle cx="8" cy="41" r="2.5" fill="#444" stroke="#666" stroke-width="0.4"/>
  <circle cx="15" cy="41" r="2.5" fill="#444" stroke="#666" stroke-width="0.4"/>
  <circle cx="22" cy="41" r="2.5" fill="#444" stroke="#666" stroke-width="0.4"/>
  <!-- Row 3 -->
  <circle cx="8" cy="51" r="2.5" fill="#444" stroke="#666" stroke-width="0.4"/>
  <circle cx="15" cy="51" r="2.5" fill="#444" stroke="#666" stroke-width="0.4"/>
  <circle cx="22" cy="51" r="2.5" fill="#444" stroke="#666" stroke-width="0.4"/>
  <!-- Row 4 -->
  <circle cx="8" cy="61" r="2.5" fill="#444" stroke="#666" stroke-width="0.4"/>
  <circle cx="15" cy="61" r="2.5" fill="#444" stroke="#666" stroke-width="0.4"/>
  <circle cx="22" cy="61" r="2.5" fill="#444" stroke="#666" stroke-width="0.4"/>
  <!-- Backplane connector -->
  <rect x="3" y="84" width="24" height="13" rx="1" fill="#1a1a1a" stroke="#555" stroke-width="0.4"/>
  <rect x="5" y="86" width="20" height="9" rx="0.5" fill="#0a0a0a" stroke="#333" stroke-width="0.3"/>
</svg>