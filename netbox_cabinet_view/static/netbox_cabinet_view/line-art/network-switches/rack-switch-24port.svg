<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 483 44" width="483" height="44">
  <!-- Generic 1U rack-mount managed switch — 24x RJ45 + 4x SFP -->
  <!-- 483mm = 19" standard rack width, 44mm = 1U height -->

  <!-- Body -->
  <rect x="0" y="0" width="483" height="44" rx="1" fill="#2d333b" stroke="#111" stroke-width="0.8"/>

  <!-- Rack ears -->
  <rect x="0" y="0" width="16" height="44" rx="1" fill="#444" stroke="#333" stroke-width="0.5"/>
  <circle cx="8" cy="11" r="3" fill="none" stroke="#666" stroke-width="0.5"/>
  <circle cx="8" cy="33" r="3" fill="none" stroke="#666" stroke-width="0.5"/>
  <rect x="467" y="0" width="16" height="44" rx="1" fill="#444" stroke="#333" stroke-width="0.5"/>
  <circle cx="475" cy="11" r="3" fill="none" stroke="#666" stroke-width="0.5"/>
  <circle cx="475" cy="33" r="3" fill="none" stroke="#666" stroke-width="0.5"/>

  <!-- Label -->
  <text x="42" y="10" font-family="sans-serif" font-size="6" fill="#aaa" font-weight="600">MANAGED SWITCH</text>

  <!-- Status LEDs -->
  <circle cx="24" cy="8" r="1.5" fill="#2ecc71" stroke="#111" stroke-width="0.3"/>
  <circle cx="30" cy="8" r="1.5" fill="#2ecc71" stroke="#111" stroke-width="0.3"/>

  <!-- 24x RJ45 ports — 2 rows of 12 -->
  <g fill="#1a1a1a" stroke="#555" stroke-width="0.4">
    <!-- Top row: ports 1-12 -->
    <rect x="24"  y="14" width="8" height="10" rx="0.3"/>
    <rect x="35"  y="14" width="8" height="10" rx="0.3"/>
    <rect x="46"  y="14" width="8" height="10" rx="0.3"/>
    <rect x="57"  y="14" width="8" height="10" rx="0.3"/>
    <rect x="68"  y="14" width="8" height="10" rx="0.3"/>
    <rect x="79"  y="14" width="8" height="10" rx="0.3"/>
    <rect x="90"  y="14" width="8" height="10" rx="0.3"/>
    <rect x="101" y="14" width="8" height="10" rx="0.3"/>
    <rect x="112" y="14" width="8" height="10" rx="0.3"/>
    <rect x="123" y="14" width="8" height="10" rx="0.3"/>
    <rect x="134" y="14" width="8" height="10" rx="0.3"/>
    <rect x="145" y="14" width="8" height="10" rx="0.3"/>
    <!-- Bottom row: ports 13-24 -->
    <rect x="24"  y="28" width="8" height="10" rx="0.3"/>
    <rect x="35"  y="28" width="8" height="10" rx="0.3"/>
    <rect x="46"  y="28" width="8" height="10" rx="0.3"/>
    <rect x="57"  y="28" width="8" height="10" rx="0.3"/>
    <rect x="68"  y="28" width="8" height="10" rx="0.3"/>
    <rect x="79"  y="28" width="8" height="10" rx="0.3"/>
    <rect x="90"  y="28" width="8" height="10" rx="0.3"/>
    <rect x="101" y="28" width="8" height="10" rx="0.3"/>
    <rect x="112" y="28" width="8" height="10" rx="0.3"/>
    <rect x="123" y="28" width="8" height="10" rx="0.3"/>
    <rect x="134" y="28" width="8" height="10" rx="0.3"/>
    <rect x="145" y="28" width="8" height="10" rx="0.3"/>
  </g>

  <!-- Port number labels (even numbers only to save space) -->
  <g font-family="monospace" font-size="3" fill="#777" text-anchor="middle">
    <text x="28" y="13">1</text>  <text x="50" y="13">3</text>
    <text x="72" y="13">5</text>  <text x="94" y="13">7</text>
    <text x="116" y="13">9</text> <text x="138" y="13">11</text>
    <text x="28" y="27">13</text> <text x="50" y="27">15</text>
    <text x="72" y="27">17</text> <text x="94" y="27">19</text>
    <text x="116" y="27">21</text><text x="138" y="27">23</text>
  </g>

  <!-- 4x SFP+ uplink cages -->
  <g fill="#0a0a0a" stroke="#555" stroke-width="0.4">
    <rect x="168" y="14" width="10" height="10" rx="0.3"/>
    <rect x="181" y="14" width="10" height="10" rx="0.3"/>
    <rect x="168" y="28" width="10" height="10" rx="0.3"/>
    <rect x="181" y="28" width="10" height="10" rx="0.3"/>
  </g>
  <text x="175" y="13" text-anchor="middle" font-family="sans-serif" font-size="3.5" fill="#999">SFP+</text>

  <!-- Console port -->
  <rect x="440" y="16" width="8" height="12" rx="0.5" fill="#1a1a1a" stroke="#555" stroke-width="0.4"/>
  <text x="444" y="14" text-anchor="middle" font-family="sans-serif" font-size="3" fill="#888">CON</text>

  <!-- PSU area indicator -->
  <rect x="380" y="4" width="50" height="36" rx="2" fill="none" stroke="#444" stroke-width="0.5" stroke-dasharray="3 2"/>
  <text x="405" y="24" text-anchor="middle" font-family="sans-serif" font-size="5" fill="#555">PSU</text>
</svg>
