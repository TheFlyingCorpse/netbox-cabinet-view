<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 70" width="90" height="70">
  <!-- Generic industrial router — 4 ETH + 2 SFP + serial console -->
  <!-- Body -->
  <rect x="0" y="0" width="90" height="70" rx="2" fill="#2d3748" stroke="#222" stroke-width="0.8"/>

  <!-- Top label strip -->
  <rect x="2" y="2" width="86" height="8" rx="1" fill="#4a5568"/>
  <text x="45" y="8.5" text-anchor="middle" font-family="sans-serif" font-size="5" fill="#e2e8f0" font-weight="600">ROUTER</text>

  <!-- Status LEDs -->
  <g>
    <circle cx="8"  cy="16" r="1.5" fill="#2ecc71" stroke="#111" stroke-width="0.3"/>
    <text x="8" y="13" text-anchor="middle" font-family="sans-serif" font-size="2.5" fill="#999">PWR</text>
    <circle cx="16" cy="16" r="1.5" fill="#2ecc71" stroke="#111" stroke-width="0.3"/>
    <text x="16" y="13" text-anchor="middle" font-family="sans-serif" font-size="2.5" fill="#999">SYS</text>
    <circle cx="24" cy="16" r="1.5" fill="#f39c12" stroke="#111" stroke-width="0.3"/>
    <text x="24" y="13" text-anchor="middle" font-family="sans-serif" font-size="2.5" fill="#999">ALM</text>
  </g>

  <!-- 4x RJ45 ETH ports -->
  <g fill="#1a1a1a" stroke="#555" stroke-width="0.5">
    <rect x="6"  y="24" width="10" height="12" rx="0.5"/>
    <rect x="19" y="24" width="10" height="12" rx="0.5"/>
    <rect x="32" y="24" width="10" height="12" rx="0.5"/>
    <rect x="45" y="24" width="10" height="12" rx="0.5"/>
  </g>
  <g font-family="sans-serif" font-size="3" fill="#999" text-anchor="middle">
    <text x="11" y="22">ETH1</text>
    <text x="24" y="22">ETH2</text>
    <text x="37" y="22">ETH3</text>
    <text x="50" y="22">ETH4</text>
  </g>

  <!-- 2x SFP uplink -->
  <g fill="#1a1a1a" stroke="#555" stroke-width="0.5">
    <rect x="62" y="24" width="10" height="12" rx="0.5"/>
    <rect x="75" y="24" width="10" height="12" rx="0.5"/>
  </g>
  <g font-family="sans-serif" font-size="2.5" fill="#999" text-anchor="middle">
    <text x="67" y="22">SFP1</text>
    <text x="80" y="22">SFP2</text>
  </g>

  <!-- Serial console port (RJ45 style, smaller) -->
  <rect x="6" y="44" width="8" height="8" rx="0.5" fill="#1a1a1a" stroke="#555" stroke-width="0.5"/>
  <text x="10" y="42" text-anchor="middle" font-family="sans-serif" font-size="2.5" fill="#999">CON</text>

  <!-- USB port -->
  <rect x="18" y="44" width="6" height="5" rx="0.5" fill="#1a1a1a" stroke="#555" stroke-width="0.5"/>
  <text x="21" y="42" text-anchor="middle" font-family="sans-serif" font-size="2.5" fill="#999">USB</text>

  <!-- DIN rail clips -->
  <rect x="15" y="58" width="18" height="4" rx="1" fill="#555" stroke="#333" stroke-width="0.3"/>
  <rect x="57" y="58" width="18" height="4" rx="1" fill="#555" stroke="#333" stroke-width="0.3"/>
</svg>
