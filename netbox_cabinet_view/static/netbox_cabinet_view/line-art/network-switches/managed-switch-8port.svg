<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 70" width="90" height="70">
  <!-- Generic managed industrial Ethernet switch — 8 RJ45 ports -->
  <!-- Body: dark grey DIN-mount housing -->
  <rect x="0" y="0" width="90" height="70" rx="2" fill="#3a3f47" stroke="#222" stroke-width="0.8"/>

  <!-- Top label strip -->
  <rect x="2" y="2" width="86" height="8" rx="1" fill="#5a6a7a"/>
  <text x="45" y="8.5" text-anchor="middle" font-family="sans-serif" font-size="5" fill="#ddd" font-weight="600">MANAGED SWITCH</text>

  <!-- Status LEDs row -->
  <g>
    <circle cx="10" cy="16" r="1.5" fill="#2ecc71" stroke="#111" stroke-width="0.3"/>
    <circle cx="16" cy="16" r="1.5" fill="#2ecc71" stroke="#111" stroke-width="0.3"/>
    <circle cx="22" cy="16" r="1.5" fill="#f39c12" stroke="#111" stroke-width="0.3"/>
    <circle cx="28" cy="16" r="1.5" fill="#555" stroke="#111" stroke-width="0.3"/>
    <circle cx="34" cy="16" r="1.5" fill="#555" stroke="#111" stroke-width="0.3"/>
    <circle cx="40" cy="16" r="1.5" fill="#555" stroke="#111" stroke-width="0.3"/>
    <circle cx="46" cy="16" r="1.5" fill="#555" stroke="#111" stroke-width="0.3"/>
    <circle cx="52" cy="16" r="1.5" fill="#555" stroke="#111" stroke-width="0.3"/>
  </g>

  <!-- 8x RJ45 port cutouts (top row of 4 + bottom row of 4) -->
  <g fill="#1a1a1a" stroke="#555" stroke-width="0.5">
    <!-- Row 1 -->
    <rect x="6"  y="22" width="8" height="10" rx="0.5"/>
    <rect x="17" y="22" width="8" height="10" rx="0.5"/>
    <rect x="28" y="22" width="8" height="10" rx="0.5"/>
    <rect x="39" y="22" width="8" height="10" rx="0.5"/>
    <!-- Row 2 -->
    <rect x="6"  y="36" width="8" height="10" rx="0.5"/>
    <rect x="17" y="36" width="8" height="10" rx="0.5"/>
    <rect x="28" y="36" width="8" height="10" rx="0.5"/>
    <rect x="39" y="36" width="8" height="10" rx="0.5"/>
  </g>

  <!-- Port labels -->
  <g font-family="sans-serif" font-size="3" fill="#999" text-anchor="middle">
    <text x="10" y="20.5">1</text>
    <text x="21" y="20.5">2</text>
    <text x="32" y="20.5">3</text>
    <text x="43" y="20.5">4</text>
    <text x="10" y="34.5">5</text>
    <text x="21" y="34.5">6</text>
    <text x="32" y="34.5">7</text>
    <text x="43" y="34.5">8</text>
  </g>

  <!-- SFP cage area (right side) -->
  <rect x="56" y="22" width="12" height="24" rx="1" fill="#2a2a2a" stroke="#555" stroke-width="0.5"/>
  <text x="62" y="20.5" text-anchor="middle" font-family="sans-serif" font-size="3" fill="#999">SFP</text>
  <!-- SFP slot 1 -->
  <rect x="58" y="24" width="8" height="9" rx="0.5" fill="#1a1a1a" stroke="#444" stroke-width="0.3"/>
  <!-- SFP slot 2 -->
  <rect x="58" y="35" width="8" height="9" rx="0.5" fill="#1a1a1a" stroke="#444" stroke-width="0.3"/>

  <!-- DIN rail clip indicators at bottom -->
  <rect x="15" y="52" width="18" height="4" rx="1" fill="#555" stroke="#333" stroke-width="0.3"/>
  <rect x="57" y="52" width="18" height="4" rx="1" fill="#555" stroke="#333" stroke-width="0.3"/>

  <!-- Grounding screw -->
  <circle cx="80" cy="60" r="2.5" fill="none" stroke="#888" stroke-width="0.5"/>
  <line x1="78" y1="60" x2="82" y2="60" stroke="#888" stroke-width="0.5"/>
  <line x1="80" y1="58" x2="80" y2="62" stroke="#888" stroke-width="0.5"/>
</svg>
