<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 100">
  <!-- Generic DIN-rail 24V DC power supply — de-branded -->
  <rect x="0.5" y="0.5" width="39" height="99" rx="1" fill="#3a3a3a" stroke="#555" stroke-width="0.5"/>
  <!-- Label area -->
  <text x="20" y="10" text-anchor="middle" font-size="4" fill="#ccc" font-family="sans-serif" font-weight="bold">24V DC</text>
  <!-- Status LED -->
  <circle cx="20" cy="17" r="2" fill="#0a0" stroke="#080" stroke-width="0.3"/>
  <text x="20" y="23" text-anchor="middle" font-size="2.5" fill="#888" font-family="sans-serif">PWR OK</text>
  <!-- Output indicator bar -->
  <rect x="8" y="27" width="24" height="3" rx="0.5" fill="#222" stroke="#555" stroke-width="0.2"/>
  <rect x="8" y="27" width="18" height="3" rx="0.5" fill="#0a0" opacity="0.6"/>
  <!-- Voltage adjustment pot -->
  <circle cx="33" cy="37" r="2.5" fill="#555" stroke="#777" stroke-width="0.3"/>
  <line x1="33" y1="35" x2="33" y2="37" stroke="#999" stroke-width="0.4"/>
  <text x="28" y="38" text-anchor="end" font-size="2" fill="#888" font-family="sans-serif">ADJ</text>
  <!-- Output terminals -->
  <text x="20" y="47" text-anchor="middle" font-size="2.5" fill="#888" font-family="sans-serif">OUTPUT</text>
  <rect x="4" y="50" width="10" height="6" rx="0.5" fill="#c0c0c0" stroke="#888" stroke-width="0.3"/>
  <text x="9" y="54.5" text-anchor="middle" font-size="2.5" fill="#333" font-family="sans-serif">V+</text>
  <rect x="16" y="50" width="10" height="6" rx="0.5" fill="#c0c0c0" stroke="#888" stroke-width="0.3"/>
  <text x="21" y="54.5" text-anchor="middle" font-size="2.5" fill="#333" font-family="sans-serif">V-</text>
  <rect x="28" y="50" width="8" height="6" rx="0.5" fill="#cc0" stroke="#aa0" stroke-width="0.3"/>
  <text x="32" y="54.5" text-anchor="middle" font-size="2.5" fill="#333" font-family="sans-serif">PE</text>
  <!-- Input terminals -->
  <text x="20" y="65" text-anchor="middle" font-size="2.5" fill="#888" font-family="sans-serif">INPUT</text>
  <rect x="4" y="68" width="10" height="6" rx="0.5" fill="#c0c0c0" stroke="#888" stroke-width="0.3"/>
  <text x="9" y="72.5" text-anchor="middle" font-size="2.5" fill="#333" font-family="sans-serif">L</text>
  <rect x="16" y="68" width="10" height="6" rx="0.5" fill="#c0c0c0" stroke="#888" stroke-width="0.3"/>
  <text x="21" y="72.5" text-anchor="middle" font-size="2.5" fill="#333" font-family="sans-serif">N</text>
  <rect x="28" y="68" width="8" height="6" rx="0.5" fill="#cc0" stroke="#aa0" stroke-width="0.3"/>
  <text x="32" y="72.5" text-anchor="middle" font-size="2.5" fill="#333" font-family="sans-serif">PE</text>
  <!-- DIN rail clip -->
  <rect x="8" y="90" width="24" height="6" rx="1" fill="#555" stroke="#444" stroke-width="0.3"/>
  <line x1="10" y1="93" x2="30" y2="93" stroke="#444" stroke-width="0.3"/>
</svg>