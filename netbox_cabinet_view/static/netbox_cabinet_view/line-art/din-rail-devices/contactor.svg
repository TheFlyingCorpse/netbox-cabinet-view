<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 90">
  <!-- Generic DIN-rail contactor — de-branded -->
  <rect x="0.5" y="0.5" width="44" height="89" rx="1" fill="#a0a0a0" stroke="#777" stroke-width="0.5"/>
  <!-- Label -->
  <text x="22.5" y="8" text-anchor="middle" font-size="5" fill="#333" font-family="sans-serif" font-weight="bold">K</text>
  <!-- Status indicator -->
  <circle cx="38" cy="6" r="1.8" fill="#0a0" stroke="#080" stroke-width="0.2"/>
  <!-- Aux contacts (4 small terminals at top) -->
  <text x="22.5" y="14" text-anchor="middle" font-size="2" fill="#555" font-family="sans-serif">AUX</text>
  <rect x="4" y="16" width="8" height="4" rx="0.3" fill="#c0c0c0" stroke="#888" stroke-width="0.2"/>
  <text x="8" y="19" text-anchor="middle" font-size="2" fill="#444" font-family="sans-serif">13</text>
  <rect x="14" y="16" width="8" height="4" rx="0.3" fill="#c0c0c0" stroke="#888" stroke-width="0.2"/>
  <text x="18" y="19" text-anchor="middle" font-size="2" fill="#444" font-family="sans-serif">14</text>
  <rect x="24" y="16" width="8" height="4" rx="0.3" fill="#c0c0c0" stroke="#888" stroke-width="0.2"/>
  <text x="28" y="19" text-anchor="middle" font-size="2" fill="#444" font-family="sans-serif">21</text>
  <rect x="34" y="16" width="8" height="4" rx="0.3" fill="#c0c0c0" stroke="#888" stroke-width="0.2"/>
  <text x="38" y="19" text-anchor="middle" font-size="2" fill="#444" font-family="sans-serif">22</text>
  <!-- Main contacts: 3 pairs -->
  <text x="22.5" y="28" text-anchor="middle" font-size="2.5" fill="#555" font-family="sans-serif">MAIN</text>
  <!-- L1/T1 -->
  <rect x="3" y="31" width="12" height="6" rx="0.5" fill="#c0c0c0" stroke="#888" stroke-width="0.3"/>
  <text x="9" y="35.5" text-anchor="middle" font-size="2.5" fill="#333" font-family="sans-serif">L1</text>
  <rect x="3" y="40" width="12" height="6" rx="0.5" fill="#c0c0c0" stroke="#888" stroke-width="0.3"/>
  <text x="9" y="44.5" text-anchor="middle" font-size="2.5" fill="#333" font-family="sans-serif">T1</text>
  <!-- L2/T2 -->
  <rect x="17" y="31" width="12" height="6" rx="0.5" fill="#c0c0c0" stroke="#888" stroke-width="0.3"/>
  <text x="23" y="35.5" text-anchor="middle" font-size="2.5" fill="#333" font-family="sans-serif">L2</text>
  <rect x="17" y="40" width="12" height="6" rx="0.5" fill="#c0c0c0" stroke="#888" stroke-width="0.3"/>
  <text x="23" y="44.5" text-anchor="middle" font-size="2.5" fill="#333" font-family="sans-serif">T2</text>
  <!-- L3/T3 -->
  <rect x="31" y="31" width="12" height="6" rx="0.5" fill="#c0c0c0" stroke="#888" stroke-width="0.3"/>
  <text x="37" y="35.5" text-anchor="middle" font-size="2.5" fill="#333" font-family="sans-serif">L3</text>
  <rect x="31" y="40" width="12" height="6" rx="0.5" fill="#c0c0c0" stroke="#888" stroke-width="0.3"/>
  <text x="37" y="44.5" text-anchor="middle" font-size="2.5" fill="#333" font-family="sans-serif">T3</text>
  <!-- Contact bridge lines -->
  <line x1="9" y1="37" x2="9" y2="40" stroke="#666" stroke-width="0.4"/>
  <line x1="23" y1="37" x2="23" y2="40" stroke="#666" stroke-width="0.4"/>
  <line x1="37" y1="37" x2="37" y2="40" stroke="#666" stroke-width="0.4"/>
  <!-- Coil terminals -->
  <text x="22.5" y="55" text-anchor="middle" font-size="2.5" fill="#555" font-family="sans-serif">COIL</text>
  <rect x="8" y="57" width="12" height="6" rx="0.5" fill="#c0c0c0" stroke="#888" stroke-width="0.3"/>
  <text x="14" y="61.5" text-anchor="middle" font-size="2.5" fill="#333" font-family="sans-serif">A1</text>
  <rect x="26" y="57" width="12" height="6" rx="0.5" fill="#c0c0c0" stroke="#888" stroke-width="0.3"/>
  <text x="32" y="61.5" text-anchor="middle" font-size="2.5" fill="#333" font-family="sans-serif">A2</text>
  <!-- Coil symbol -->
  <path d="M18 66 Q20 64 22 66 Q24 68 26 66" fill="none" stroke="#555" stroke-width="0.4"/>
  <!-- DIN rail clip -->
  <rect x="8" y="78" width="28" height="6" rx="1" fill="#999" stroke="#777" stroke-width="0.3"/>
  <line x1="10" y1="81" x2="36" y2="81" stroke="#777" stroke-width="0.3"/>
</svg>