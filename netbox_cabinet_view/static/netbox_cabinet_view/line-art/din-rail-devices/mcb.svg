<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 18 70">
  <!-- Generic miniature circuit breaker — de-branded -->
  <rect x="0.5" y="0.5" width="17" height="69" rx="1" fill="#e0e0e0" stroke="#999" stroke-width="0.5"/>
  <!-- Toggle lever (ON position) -->
  <rect x="5" y="6" width="8" height="16" rx="1" fill="#ccc" stroke="#999" stroke-width="0.3"/>
  <path d="M7 20 Q9 8 11 20" fill="none" stroke="#333" stroke-width="1" stroke-linecap="round"/>
  <rect x="7.5" y="8" width="3" height="8" rx="1" fill="#e87020"/>
  <!-- Trip indicator window -->
  <rect x="6" y="26" width="6" height="3" rx="0.3" fill="#0a0" stroke="#888" stroke-width="0.2"/>
  <!-- Rating label -->
  <text x="9" y="37" text-anchor="middle" font-size="4" fill="#333" font-family="sans-serif" font-weight="bold">C16</text>
  <!-- Terminal (line) -->
  <circle cx="9" cy="46" r="2.5" fill="#c0c0c0" stroke="#888" stroke-width="0.3"/>
  <line x1="7.5" y1="44.5" x2="10.5" y2="47.5" stroke="#666" stroke-width="0.4"/>
  <!-- Terminal (load) -->
  <circle cx="9" cy="55" r="2.5" fill="#c0c0c0" stroke="#888" stroke-width="0.3"/>
  <line x1="7.5" y1="53.5" x2="10.5" y2="56.5" stroke="#666" stroke-width="0.4"/>
  <!-- DIN clip -->
  <rect x="3" y="61" width="12" height="5" rx="1" fill="#999" stroke="#777" stroke-width="0.3"/>
  <line x1="5" y1="63.5" x2="13" y2="63.5" stroke="#777" stroke-width="0.3"/>
</svg>